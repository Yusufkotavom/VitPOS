name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version into Android build files
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs "${{ github.ref_name }}"

      - name: Build web app
        env:
          VITE_APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0' }}
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Sync Capacitor Android
        working-directory: apps/mobile
        run: npm run sync

      - name: Restore Android signing keystore from secret
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_KEYSTORE == 'true'
        working-directory: apps/mobile/android/app
        env:
          HAS_KEYSTORE: ${{ secrets.KOTACOM_RELEASE_KEYSTORE_BASE64 != '' }}
          KOTACOM_RELEASE_KEYSTORE_BASE64: ${{ secrets.KOTACOM_RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KOTACOM_RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build installable debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          KOTACOM_RELEASE_STORE_FILE: ${{ secrets.KOTACOM_RELEASE_STORE_FILE }}
          KOTACOM_RELEASE_STORE_PASSWORD: ${{ secrets.KOTACOM_RELEASE_STORE_PASSWORD }}
          KOTACOM_RELEASE_KEY_ALIAS: ${{ secrets.KOTACOM_RELEASE_KEY_ALIAS }}
          KOTACOM_RELEASE_KEY_PASSWORD: ${{ secrets.KOTACOM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Generate APK checksum
        working-directory: apps/mobile/android
        run: |
          for file in app/build/outputs/apk/release/*.apk; do
            sha256sum "$file" | awk '{print $1}' > "$file.sha256"
          done

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            apps/mobile/android/app/build/outputs/apk/debug/*.apk
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            apps/mobile/android/app/build/outputs/apk/release/*.sha256

      - name: Attach Android assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/mobile/android/app/build/outputs/apk/debug/*.apk
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            apps/mobile/android/app/build/outputs/apk/release/*.sha256

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version into desktop build files
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs "${{ github.ref_name }}"

      - name: Build web app
        env:
          VITE_APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0' }}
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: VitPOS ${{ github.ref_name }}
          releaseBody: Automated release build for VitPOS.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attach desktop updater signatures to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/**/*.sig
            apps/desktop/src-tauri/target/release/bundle/**/latest*.json

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.sig
            apps/desktop/src-tauri/target/release/bundle/**/latest*.json
